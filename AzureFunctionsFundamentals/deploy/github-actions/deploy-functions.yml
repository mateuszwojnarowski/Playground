name: Deploy one Azure Functions app

"on":
  workflow_dispatch:
    inputs:
      environment_name:
        description: GitHub Environment that protects this deployment, for example dev, test, or prod.
        required: true
        default: dev
        type: environment
      function_app_name:
        description: Name of the existing Azure Function App created by deploy/bicep/main.bicep.
        required: true
        type: string
      project_path:
        description: Path to one .NET 10 isolated Functions .csproj to publish.
        required: true
        default: AzureFunctionsFundamentals/modules/01-http-trigger/examples/HttpExample/HttpExample.csproj
        type: string
      dotnet_configuration:
        description: .NET build configuration.
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

permissions:
  id-token: write
  contents: read

env:
  PUBLISH_OUTPUT: ./published-function-app

jobs:
  publish-and-deploy:
    name: Publish and deploy function app
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Restore selected Functions project
        run: dotnet restore "${{ inputs.project_path }}"

      - name: Publish selected .NET 10 isolated Functions project
        run: >-
          dotnet publish "${{ inputs.project_path }}"
          --configuration "${{ inputs.dotnet_configuration }}"
          --output "${{ env.PUBLISH_OUTPUT }}"
          --no-restore

      - name: Deploy package to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ inputs.function_app_name }}
          package: ${{ env.PUBLISH_OUTPUT }}
          # No publish-profile is used. azure/login@v2 supplies an OIDC-backed Azure identity.
